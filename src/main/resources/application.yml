spring:
  application:
    name: habit-tracker
  datasource:
    url: jdbc:postgresql://localhost:5432/habit_tracker
    username: habit_user
    password: habit_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  security:
    user:
      name: user
      password: user

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,beans,mappings
  endpoint:
    health:
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

habit:
  template:
    allow-multiple-habits-from-template: true

logging:
  level:
    io.github.habittracker: DEBUG
    org.springframework.security: WARN

---
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    show-sql: true

logging:
  level:
    io.github.habittracker: TRACE